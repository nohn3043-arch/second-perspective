name: Publish Python 🐍 distribution 📦 to PyPI

on:
  push:
    tags:
      - 'v*' # 当你推送 vX.X.X 格式的标签时，自动触发发布
  workflow_dispatch: # 也可以在 Actions 页面手动触发

permissions:
  contents: read

jobs:
  build-and-publish:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/你的包名 # 替换成你的 PyPI 项目名
    permissions:
      id-token: write # 用于 PyPI 可信发布认证
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.x" # 替换成你需要的 Python 版本，比如 3.11

    - name: Install build dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build

    - name: Build package
      run: python -m build

    - name: Publish package to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
