name: Publish 第二视角 to PyPI

on:
  push:
    tags:
      - 'v*'  # 推送 vX.X.X 标签时自动发布
  workflow_dispatch:  # 也支持在 Actions 页面手动一键发布

permissions:
  contents: read

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/第二视角  # 这里是你未来 PyPI 项目的地址
    permissions:
      id-token: write  # 用于 PyPI 可信发布认证

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 配置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"  # 你可以改成 3.8~3.12 之间你项目用的版本

      - name: 安装打包工具
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: 构建 Python 包
        run: python -m build

      - name: 发布到 PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
